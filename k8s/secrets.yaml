apiVersion: v1
kind: Secret
metadata:
  name: pizza-secrets
  namespace: pizza-delivery
type: Opaque
stringData:
  database-url: "jdbc:postgresql://pizza-postgres:5432/pizza_delivery"
  database-username: "postgres"
  database-password: "CHANGE_ME_IN_PRODUCTION"
  jwt-secret: "CHANGE_ME_JWT_SECRET_KEY_256_BIT"
  redis-password: ""
  aws-access-key-id: ""
  aws-secret-access-key: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pizza-config
  namespace: pizza-delivery
data:
  APP_ENV: "production"
  AWS_REGION: "us-east-1"
  FRONTEND_URL: "https://pizzadelivery.com"
  API_BASE_URL: "https://api.pizzadelivery.com/api/v1"
  WEBSOCKET_URL: "wss://api.pizzadelivery.com/ws"
