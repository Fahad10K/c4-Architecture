apiVersion: apps/v1
kind: Deployment
metadata:
  name: pizza-frontend
  namespace: pizza-delivery
  labels:
    app: pizza-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pizza-frontend
  template:
    metadata:
      labels:
        app: pizza-frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/pizza-delivery/pizza-delivery-frontend:latest
          ports:
            - containerPort: 5173
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pizza-frontend
  namespace: pizza-delivery
spec:
  selector:
    app: pizza-frontend
  ports:
    - port: 80
      targetPort: 5173
      protocol: TCP
  type: ClusterIP
