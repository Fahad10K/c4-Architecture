apiVersion: apps/v1
kind: Deployment
metadata:
  name: pizza-backend
  namespace: pizza-delivery
  labels:
    app: pizza-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pizza-backend
  template:
    metadata:
      labels:
        app: pizza-backend
        tier: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/pizza-delivery/pizza-delivery-backend:latest
          ports:
            - containerPort: 3001
              protocol: TCP
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: pizza-secrets
                  key: database-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: pizza-secrets
                  key: database-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pizza-secrets
                  key: database-password
            - name: SPRING_DATA_REDIS_HOST
              value: pizza-redis
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pizza-secrets
                  key: jwt-secret
            - name: AWS_REGION
              value: us-east-1
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pizza-backend
  namespace: pizza-delivery
spec:
  selector:
    app: pizza-backend
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
  type: ClusterIP
