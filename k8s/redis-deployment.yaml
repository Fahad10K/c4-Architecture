apiVersion: apps/v1
kind: Deployment
metadata:
  name: pizza-redis
  namespace: pizza-delivery
  labels:
    app: pizza-redis
    tier: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pizza-redis
  template:
    metadata:
      labels:
        app: pizza-redis
        tier: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--appendonly", "yes"]
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: redis-storage
              mountPath: /data
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: pizza-redis
  namespace: pizza-delivery
spec:
  selector:
    app: pizza-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: pizza-delivery
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: gp2
