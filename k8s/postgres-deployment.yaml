apiVersion: apps/v1
kind: Deployment
metadata:
  name: pizza-postgres
  namespace: pizza-delivery
  labels:
    app: pizza-postgres
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pizza-postgres
  template:
    metadata:
      labels:
        app: pizza-postgres
        tier: database
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: pizza_delivery
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pizza-secrets
                  key: database-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pizza-secrets
                  key: database-password
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: pizza-postgres
  namespace: pizza-delivery
spec:
  selector:
    app: pizza-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: pizza-delivery
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: gp2
